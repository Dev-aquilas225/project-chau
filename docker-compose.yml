services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_USE_EMULATORS: ${VITE_USE_EMULATORS:-false}
    restart: unless-stopped
    ports:
      - "80"
    labels:
      - "coolify.managed=true"

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${ADMIN_VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${ADMIN_VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${ADMIN_VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${ADMIN_VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${ADMIN_VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${ADMIN_VITE_FIREBASE_APP_ID}
        VITE_USE_EMULATORS: ${VITE_USE_EMULATORS:-false}
    restart: unless-stopped
    ports:
      - "80"
    labels:
      - "coolify.managed=true"
